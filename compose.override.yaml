# Development environment override
services:
  php:
    build:
      context: .
      target: php_dev
      args:
        - PHP_VERSION=${PHP_VERSION:-8.1}
        - NODE_VERSION=${NODE_VERSION:-18}
    volumes:
      - ./:/var/www/html
      - /var/www/html/var
      # If you develop on Mac or Windows you can remove the vendor/ directory
      #  from the bind-mount for better performance by enabling the next line:
      # - /var/www/html/vendor
    ports:
      # HTTP
      - target: 80
        published: ${HTTP_PORT:-8001}
        protocol: tcp
    environment:
      DATABASE_URL: mysql://${DB_USER:-prestashop}:${DB_PASSWD:-prestashop}@${DB_SERVER:-database}:${DB_PORT:-3306}/${DB_NAME:-prestashop}?serverVersion=${DB_VERSION:-8.4.6}&charset=${DB_CHARSET:-utf8mb4}
      DB_SERVER: ${DB_SERVER:-database}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-prestashop}
      DB_USER: ${DB_USER:-prestashop}
      DB_PASSWD: ${DB_PASSWD:-prestashop}
      DB_PREFIX: ${DB_PREFIX:-ps_}

      PS_INSTALL_AUTO: ${PS_INSTALL_AUTO:-1}
      PS_DOMAIN: ${PS_DOMAIN:-localhost:8001}
      PS_ENABLE_SSL: ${PS_ENABLE_SSL:-0}
      PS_FOLDER_INSTALL: ${PS_FOLDER_INSTALL:-install-dev}
      PS_FOLDER_ADMIN: ${PS_FOLDER_ADMIN:-admin}
      PS_LANGUAGE: ${PS_LANGUAGE:-en}
      PS_COUNTRY: ${PS_COUNTRY:-GB}
      PS_ALL_LANGUAGES: ${PS_ALL_LANGUAGES:-0}
      PS_INSTALL_DEMO_PRODUCTS: ${PS_INSTALL_DEMO_PRODUCTS:-1}
      PS_DEV_MODE: ${PS_DEV_MODE:-1}
      PS_DEMO_MODE: ${PS_DEMO_MODE:-0}
      PS_HOST_MODE: ${PS_HOST_MODE:-0}
      PS_ERASE_DB: ${PS_ERASE_DB:-0}
      PS_INSTALL_DB: ${PS_INSTALL_DB:-0}
      PS_HANDLE_DYNAMIC_DOMAIN: ${PS_HANDLE_DYNAMIC_DOMAIN:-0}
      PS_USE_DOCKER_MAILDEV: ${PS_USE_DOCKER_MAILDEV:-1}

      ADMIN_FIRSTNAME: ${ADMIN_FIRSTNAME:-John}
      ADMIN_LASTNAME: ${ADMIN_LASTNAME:-Doe}
      ADMIN_MAIL: ${ADMIN_MAIL:-demo@prestashop.com}
      ADMIN_PASSWD: ${ADMIN_PASSWD:-Correct Horse Battery Staple}
      
      # See https://xdebug.org/docs/all_settings#mode
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway
    tty: true


###> doctrine/doctrine-bundle ###
  database:
    ports:
      - target: 3306
        published: 3306
        protocol: tcp
###< doctrine/doctrine-bundle ###

  maildev:
    ports:
      - target: 1080
        published: 1080
        protocol: tcp
      - target: 1025
        published: 1025
        protocol: tcp
