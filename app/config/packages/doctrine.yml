# Doctrine Configuration
doctrine:
  dbal:
    driver: pdo_mysql
    wrapper_class: PrestaShopBundle\Doctrine\DatabaseConnection
    host: "%database_host%"
    port: "%database_port%"
    dbname: "%database_name%"
    user: "%database_user%"
    password: "%database_password%"
    charset: utf8mb4

    profiling_collect_backtrace: '%kernel.debug%'
    use_savepoints: true

    mapping_types:
      enum: string
    options:
      # PDO::MYSQL_ATTR_INIT_COMMAND
      !php/const PDO::MYSQL_ATTR_INIT_COMMAND: "SET sql_mode=(SELECT REPLACE(@@sql_mode,'ONLY_FULL_GROUP_BY',''))"
      # PDO::MYSQL_ATTR_MULTI_STATEMENTS
      !php/const PDO::MYSQL_ATTR_MULTI_STATEMENTS: '%env(const:runtime:_PS_ALLOW_MULTI_STATEMENTS_QUERIES_)%'

  orm:
    auto_generate_proxy_classes: true
    # enable_lazy_ghost_objects: true
    # report_fields_where_declared: true
    # validate_xml_mapping: true
    naming_strategy: prestashop.database.naming_strategy
    auto_mapping: true
    mappings:
      # In front container we must define the mapping manually because PrestaShopBundle cannot do it
      PrestaShopBundle\Entity:
        type: annotation
        dir: "%kernel.project_dir%/src/PrestaShopBundle/Entity"
        is_bundle: false
        prefix: PrestaShop
    dql:
      string_functions:
        regexp: DoctrineExtensions\Query\Mysql\Regexp
        binary: DoctrineExtensions\Query\Mysql\Binary

when@test:
  doctrine:
    dbal:
      dbname: "test_%database_name%"

when@prod:
  doctrine:
    orm:
      auto_generate_proxy_classes: false
      proxy_dir: '%kernel.build_dir%/doctrine/orm/Proxies'
      query_cache_driver:
        type: pool
        pool: doctrine.system_cache_pool
      result_cache_driver:
        type: pool
        pool: doctrine.result_cache_pool

  framework:
    cache:
      pools:
        doctrine.result_cache_pool:
          adapter: cache.app
        doctrine.system_cache_pool:
          adapter: cache.system
